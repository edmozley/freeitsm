<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreeITSM Watchtower — Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .options-header {
            background: #0078d4;
            color: #fff;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .form {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group .hint {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
        }

        .api-key-field {
            position: relative;
        }

        .api-key-field input {
            padding-right: 40px;
        }

        .toggle-visibility {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            padding: 4px;
            display: flex;
        }

        .toggle-visibility:hover {
            color: #0078d4;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary {
            background: #0078d4;
            color: #fff;
            flex: 1;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .status-msg {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .status-msg.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-msg.error {
            display: block;
            background: #fce4ec;
            color: #c62828;
        }

        .status-msg.testing {
            display: block;
            background: #e3f2fd;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="options-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <h1>Watchtower Settings</h1>
        </div>
        <div class="form">
            <div class="form-group">
                <label for="serverUrl">Server URL</label>
                <input type="url" id="serverUrl" placeholder="https://itsm.example.com/freeitsm-app">
                <div class="hint">The base URL of your FreeITSM installation (no trailing slash).</div>
            </div>

            <div class="form-group">
                <label for="apiKey">API Key</label>
                <div class="api-key-field">
                    <input type="password" id="apiKey" placeholder="Paste your API key here">
                    <button class="toggle-visibility" id="toggleKey" title="Show/hide">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="hint">Generate an API key in FreeITSM under Software &gt; Settings &gt; API Keys.</div>
            </div>

            <div class="form-group">
                <label for="pollInterval">Poll Interval</label>
                <select id="pollInterval">
                    <option value="1">Every 1 minute</option>
                    <option value="2">Every 2 minutes</option>
                    <option value="5" selected>Every 5 minutes</option>
                    <option value="10">Every 10 minutes</option>
                    <option value="15">Every 15 minutes</option>
                    <option value="30">Every 30 minutes</option>
                </select>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="saveBtn">Save</button>
                <button class="btn btn-secondary" id="testBtn">Test</button>
            </div>

            <div class="status-msg" id="statusMsg"></div>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
